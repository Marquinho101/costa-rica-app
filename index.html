<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costa Rica - Aventura Familiar</title>

<!-- SEO & Dark Social Meta Tags (WhatsApp) -->
<meta name="description" content="Itinerario interactivo de nuestra aventura familiar en Costa Rica. Pura Vida.">
<meta name="theme-color" content="#000000">
<meta property="og:type" content="website">
<meta property="og:title" content="Costa Rica 🌴 | La Pandilla Punkie">
<meta property="og:description" content="Descubre nuestra ruta, hoteles y apúntate a los bloques del viaje. ¡Pura Vida!">
<meta property="og:url" content="https://marcobernadas.es/">
<meta property="og:image" content="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200&q=80">
<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #000000; /* Negro puro para contraste máximo OLED */
    --card-bg: #111111;
    --text-main: #ffffff; /* Blanco puro */
  }
  
  html { scroll-behavior: smooth; }

  body { 
    font-family: 'Space Grotesk', sans-serif; 
    margin: 0; padding: 0; 
    background-color: var(--bg-dark); 
    color: var(--text-main); 
    display: flex; justify-content: center;
    overflow-x: hidden;
  }
  
  .app-container { 
    width: 100%; max-width: 375px; 
    background-color: var(--bg-dark); 
    position: relative; 
    padding-bottom: 90px; 
  }

  /* A11y: Títulos hipertrofiados */
  header { padding: 30px 20px 10px; text-align: center; }
  h1 { margin: 0; font-size: 44px; font-weight: 700; text-transform: uppercase; letter-spacing: -1px; color: #fff;}
  h2 { font-family: 'Caveat', cursive; margin: -5px 0 20px 0; font-size: 32px; color: #00ffcc; transform: rotate(-3deg);}

  /* A11y: Botón principal más grande (Tap Target) */
  .master-map-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(90deg, #111, #222);
    border: 2px solid #555; color: #fff;
    padding: 15px 20px; margin: 0 15px 25px 15px;
    border-radius: 12px; font-weight: 700; font-size: 16px; text-transform: uppercase;
    box-shadow: 0 4px 15px rgba(0,0,0,0.8); cursor: pointer; transition: all 0.2s;
  }
  .master-map-btn:active { transform: scale(0.95); background: #333;}

  /* --- MODAL MAPA LOCAL --- */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); z-index: 3000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  
  .map-wrapper {
    position: relative; width: 350px; height: 500px;
    background: url('./mapa.jpg') center/cover;
    border-radius: 16px; border: 3px solid #444; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  }
  .map-marker {
    position: absolute; transform: translate(-50%, -50%);
    font-size: 26px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
    animation: bounce 2s infinite ease-in-out;
  }
  .map-marker::after {
    content: attr(data-label); position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    background: #000; color: #fff; font-size: 12px; padding: 4px 8px;
    border-radius: 4px; font-weight: bold; white-space: nowrap; border: 1px solid #555;
  }
  @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -60%); } }
  
  .close-map-btn {
    margin-top: 20px; padding: 12px 24px; background: #fff; color: #000;
    font-weight: bold; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase;
  }

  /* --- TARJETAS --- */
  .cards-container { padding: 0 15px; display: flex; flex-direction: column; gap: 25px; }

  .card { 
    background: var(--card-bg); border-radius: 24px; overflow: hidden; position: relative;
    border: 2px solid var(--theme-color, #333); scroll-margin-top: 20px; 
    content-visibility: auto; contain-intrinsic-size: 400px;
  }

  .card-img { 
    width: 100%; height: 260px; object-fit: cover; display: block;
    border-bottom: 3px solid var(--theme-color, #333); background-color: #222;
  }

  /* A11y: Textos interiores masivos y con mayor peso */
  .card-content { padding: 20px; }
  .zone-title { font-size: 28px; font-weight: 700; margin: 0 0 5px 0; text-transform: uppercase; color: var(--theme-color, #fff);}
  .kids-title { font-family: 'Caveat', cursive; font-size: 28px; margin: 0 0 15px 0; letter-spacing: 1px; color: var(--theme-color, #fff);}
  .desc { font-size: 18px; line-height: 1.4; color: #f5f5f5; font-weight: 500; margin-bottom: 20px;}
  
  .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

  /* A11y: Botones más altos y legibles */
  .action-btn {
    text-align: center; padding: 14px 5px; border-radius: 12px;
    text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 14px;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: transform 0.1s;
  }
  .action-btn:active { transform: scale(0.95); }
  
  .btn-neon { background: var(--theme-color); color: #000; }
  .btn-dark { background: #222; color: #fff; border: 1px solid #666;}
  
  /* A11y: Panel de detalles gigante */
  .details-panel {
    display: none; margin-top: 15px; padding: 18px; background: #0a0a0a; border-radius: 12px; 
    border-left: 4px solid var(--theme-color, #fff); font-size: 16px; color: #ddd; line-height: 1.6;
  }
  .details-panel a { color: var(--theme-color); text-decoration: underline; font-weight: bold; }
  .details-panel strong { color: #fff; font-size: 17px;}
  .details-panel.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #00ffcc; color: #000; padding: 12px 24px; border-radius: 30px; 
    font-weight: bold; font-size: 16px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 4000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  .timeline-bar { 
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 375px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); 
    padding: 15px 0; border-top: 1px solid #333; display: flex; justify-content: center; gap: 5px; z-index: 1000;
    will-change: transform;
  }
  .day-dot { 
    width: 16px; height: 16px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; 
    font-size: 9px; font-weight: bold; color: #888; text-decoration: none; transition: all 0.3s ease;
  }
  .day-dot.active { background: var(--theme-color, #fff); color: #000; transform: scale(1.3); }
</style>
</head>
<body>

<div id="toast" class="toast" aria-live="polite">Notificación</div>

<!-- MODAL MAPA: Coordenadas calibradas para tu imagen -->
<div id="modal-map" class="modal-overlay">
  <div class="map-wrapper">
    <div class="map-marker" style="top: 55%; left: 47%;" data-label="San José">📍</div>
    <div class="map-marker" style="top: 75%; left: 82%;" data-label="Caribe Sur">📍</div>
    <div class="map-marker" style="top: 35%; left: 65%;" data-label="Tortuguero">📍</div>
    <div class="map-marker" style="top: 35%; left: 35%;" data-label="La Fortuna">📍</div>
    <div class="map-marker" style="top: 42%; left: 32%;" data-label="Monteverde">📍</div>
    <div class="map-marker" style="top: 65%; left: 45%;" data-label="Tárcoles">📍</div>
    <div class="map-marker" style="top: 48%; left: 45%;" data-label="Poás">📍</div>
  </div>
  <button data-action="close-map" class="close-map-btn">✖ Cerrar Mapa</button>
</div>

<div class="app-container">
  <header>
    <h1>Costa Rica</h1>
    <h2>La Pandilla Punkie</h2>
  </header>

  <button data-action="open-map" class="master-map-btn">
    🗺️ Ver Mapa de la Ruta
  </button>

  <div class="cards-container" id="itinerary-render">
    <!-- Generado dinámicamente -->
  </div>

  <nav class="timeline-bar" id="timeline" aria-label="Línea de tiempo del viaje">
    <!-- Generado dinámicamente -->
  </nav>
</div>

<script>
  // JSON DE DATOS - Bloques perfectos y blindados
  const tripData = [
    { 
      id: "sanjose-inicio", limitDay: 4, zone: "San José", kidsTitle: "¡Aterrizaje y Pizza!", 
      img: "./pizza.jpg", 
      desc: "Llegamos, recuperamos energía en la capital y el día 2 celebramos el cumple de Luciana con una Pizza Party épica.", 
      color: "#ffdd00", ytLink: "https://www.youtube.com/results?search_query=san+jose+costa+rica+ninos", 
      details: "<strong>Fechas:</strong> 1 al 4 de Septiembre.<br><strong>Hospedaje:</strong> <a href='https://share.google/gHsT7TQgkYwEvenZY' target='_blank'>Hotel Casa Las Orquídeas</a>.<br><strong>Logística:</strong> Recogida de coche 4x4. Aclimatación y compras básicas." 
    },
    { 
      id: "caribe", limitDay: 7, zone: "Caribe Sur", kidsTitle: "¡La Base Pirata!", 
      img: "https://commons.wikimedia.org/wiki/Special:FilePath/Playa_de_Punta_Uva%2C_Costa_Rica.jpg?width=800", 
      desc: "Arena volcánica, playas salvajes para explorar y selva tropical. ¡Días enteros para buscar perezosos en los árboles!", 
      color: "#00ffcc", ytLink: "https://www.youtube.com/results?search_query=puerto+viejo+costa+rica+animales+ninos", 
      details: "<strong>Fechas:</strong> 4 al 8 de Septiembre.<br><strong>Solapamiento 1:</strong> Cabinas Playa Negra.<br><strong>Solapamiento 2:</strong> Cahuita. Cambio de base sin prisas." 
    },
    { 
      id: "tortuguero", limitDay: 9, zone: "Tortuguero", kidsTitle: "Exploradores del Manglar", 
      img: "https://commons.wikimedia.org/wiki/Special:FilePath/Tortuguero%2C_Costa_Rica.jpg?width=800", 
      desc: "Nos adentraremos en lancha por los laberintos de canales y manglares para descubrir monos, tucanes y caimanes salvajes.", 
      color: "#00ff55", ytLink: "https://www.youtube.com/results?search_query=tortuguero+canales+animales+costa+rica", 
      details: "<strong>Fechas:</strong> 8 y 9 de Septiembre.<br><strong>Logística:</strong> Coche en parking de La Pavona. Lancha pública hacia el pueblo.<br><strong>Hospedaje:</strong> AirBnB." 
    },
    { 
      id: "fortuna", limitDay: 11, zone: "La Fortuna", kidsTitle: "Volcanes y Toboganes", 
      img: "https://commons.wikimedia.org/wiki/Special:FilePath/Arenal_Volcano_seen_from_La_Fortuna%2C_Costa_Rica.jpg?width=800", 
      desc: "Aguas termales increíbles en medio de la naturaleza, piscinas de roca y vistas al imponente Volcán Arenal.", 
      color: "#ff0055", ytLink: "https://www.youtube.com/results?search_query=los+lagos+hot+springs+costa+rica", 
      details: "<strong>Fechas:</strong> 9 al 11 de Septiembre.<br><strong>Logística:</strong> Chapuzón térmico y paseo a caballo.<br><strong>Hospedaje:</strong> Los Lagos." 
    },
    { 
      id: "monteverde", limitDay: 12, zone: "Monteverde", kidsTitle: "Caminando en las Nubes", 
      img: "https://images.unsplash.com/photo-1550853024-fae8cd4be47f?auto=format&fit=crop&w=800&q=80", 
      desc: "Puentes colgantes gigantes entre la niebla del bosque y santuarios llenos de colibríes zumbando a tu lado.", 
      color: "#cc00ff", ytLink: "https://www.youtube.com/results?search_query=selvatura+park+monteverde+hanging+bridges", 
      details: "<strong>Fechas:</strong> 11 y 12 de Septiembre.<br><strong>Logística:</strong> Ruta escénica bordeando el Lago Arenal hacia la montaña.<br><strong>Hospedaje:</strong> Cabañas Bosque Nuboso." 
    },
    { 
      id: "tarcoles", limitDay: 13, zone: "Río Tárcoles", kidsTitle: "Cocodrilos Gigantes", 
      img: "./croco.jpg", 
      desc: "Vemos cocodrilos prehistóricos gigantes desde el puente, una parada técnica alucinante.", 
      color: "#ff8800", ytLink: "https://www.youtube.com/results?search_query=tarcoles+river+crocodiles+bridge", 
      details: "<strong>Fechas:</strong> 12 de Septiembre.<br><strong>Logística:</strong> Descenso de montaña, parada táctica en el puente del Río Tárcoles.<br><strong>Hospedaje:</strong> <a href='https://share.google/gHsT7TQgkYwEvenZY' target='_blank'>Hotel Casa Las Orquídeas</a>." 
    },
    { 
      id: "poas", limitDay: 14, zone: "Volcán Poás", kidsTitle: "El Cráter Humeante", 
      img: "https://commons.wikimedia.org/wiki/Special:FilePath/Poas_Volcano_1.jpg?width=800", 
      desc: "Nos asomamos al cráter de un volcán activo y comemos delicioso en la montaña.", 
      color: "#ff3300", ytLink: "https://www.youtube.com/results?search_query=volcan+poas+costa+rica", 
      details: "<strong>Fechas:</strong> Domingo 13 de Septiembre.<br><strong>Logística:</strong> Visita en familia 1 día + Almuerzo Típico." 
    },
    { 
      id: "sanjose-fin", limitDay: 16, zone: "San José Centro", kidsTitle: "Fiestas y Despedida", 
      img: "./sanjose.jpg", 
      desc: "Cerramos el viaje con desfiles de faroles y compras de última hora.", 
      color: "#0055ff", ytLink: "https://www.youtube.com/results?search_query=fiestas+patrias+costa+rica+15+septiembre", 
      details: "<strong>Fechas:</strong> 12 al 16 de Septiembre.<br><strong>Hospedaje:</strong> <a href='https://share.google/gHsT7TQgkYwEvenZY' target='_blank'>Hotel Casa Las Orquídeas</a>.<br><strong>Logística:</strong> Visitas San José + Fiestas Patrias + Visita Pequeño Mundo." 
    }
  ];

  const renderContainer = document.getElementById('itinerary-render');
  const timelineContainer = document.getElementById('timeline');
  const toast = document.getElementById('toast');
  const modalMap = document.getElementById('modal-map');

  function showToast(message, color) {
    toast.textContent = message;
    toast.style.background = color;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2500);
  }

  // RENDERIZADO
  tripData.forEach(data => {
    const card = document.createElement('article');
    card.className = 'card';
    card.id = data.id;
    card.style.setProperty('--theme-color', data.color); 
    
    card.innerHTML = `
      <img src="${data.img}" class="card-img" alt="Paisaje de ${data.zone}" loading="lazy">
      <div class="card-content">
        <h3 class="zone-title">${data.zone}</h3>
        <p class="kids-title">${data.kidsTitle}</p>
        <p class="desc">${data.desc}</p>
        
        <div class="btn-group">
          <a href="${data.ytLink}" target="_blank" rel="noopener noreferrer" class="action-btn btn-neon">
            <span aria-hidden="true">▶</span> Ver Tour
          </a>
          <button data-action="toggle" data-id="${data.id}" class="action-btn btn-dark">
            <span aria-hidden="true">📄</span> Detalles
          </button>
          <button data-action="join" data-id="${data.id}" class="action-btn btn-dark">
            <span aria-hidden="true">🙋</span> Me Apunto
          </button>
          <button data-action="share" data-id="${data.id}" class="action-btn btn-dark">
            <span aria-hidden="true">📤</span> Compartir
          </button>
        </div>

        <div id="details-${data.id}" class="details-panel">
          ${data.details}
        </div>
      </div>
    `;
    renderContainer.appendChild(card);
  });

  // TIMELINE
  for (let i = 1; i <= 16; i++) {
    const dot = document.createElement('a');
    dot.className = 'day-dot';
    dot.textContent = i;
    
    const section = tripData.find(r => i <= r.limitDay);
    if(section) {
      dot.href = '#' + section.id;
      dot.setAttribute('data-target', section.id);
    }
    timelineContainer.appendChild(dot);
  }

  // MOTOR DE INTERACCIÓN
  document.body.addEventListener('click', (e) => {
    // Mapa
    if (e.target.closest('[data-action="open-map"]')) {
      modalMap.classList.add('active');
      return;
    }
    if (e.target.closest('[data-action="close-map"]')) {
      modalMap.classList.remove('active');
      return;
    }

    // Tarjetas
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;

    const { action, id } = btn.dataset;

    if (action === 'toggle') {
      document.getElementById(`details-${id}`).classList.toggle('active');
    } 
    // LÓGICA DE COMPARTIR BLINDADA
    else if (action === 'share') {
      const url = `${window.location.origin}${window.location.pathname}#${id}`;
      const section = tripData.find(d => d.id === id);
      
      // Si el dispositivo soporta el Share Nativo (Móvil)
      if (navigator.share) {
        navigator.share({
          title: `¡Plan en ${section.zone}! 🌴`,
          text: `Mira este bloque de nuestro viaje a Costa Rica. ¿Te apuntas a ${section.zone}?`,
          url: url
        }).catch(err => {
          // Si el usuario cancela o el navegador bloquea la acción, forzamos el copiado al portapapeles
          navigator.clipboard.writeText(url);
          showToast("¡Enlace copiado! 🔗", "#00ffcc");
        });
      } else {
        // Si estás en un PC viejo o navegador sin soporte, copia directo
        navigator.clipboard.writeText(url).then(() => showToast("¡Enlace copiado! 🔗", "#00ffcc"));
      }
    } 
    else if (action === 'join') {
      const section = tripData.find(d => d.id === id);
      const textDetails = section.details.replace(/<br>/g, '\n').replace(/<[^>]*>?/gm, ''); 
      const subject = `¡Me apunto a ${section.zone}!`;
      const body = `¡Hola familia!\n\nMe encantaría unirme a la aventura en ${section.zone}.\n\nAquí están los datos del bloque al que me apunto:\n${textDetails}\n\n¡Un abrazo!`;
      
      window.location.href = `mailto:marcobernadas@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
  });

  // OBSERVER
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const activeId = entry.target.id;
        const activeColor = entry.target.style.getPropertyValue('--theme-color');
        
        document.querySelectorAll('.day-dot.active').forEach(dot => {
          dot.classList.remove('active');
          dot.style.removeProperty('background'); 
          dot.style.color = '#888';
        });

        document.querySelectorAll(`.day-dot[data-target="${activeId}"]`).forEach(dot => {
          dot.classList.add('active');
          dot.style.setProperty('--theme-color', activeColor);
          dot.style.color = '#000';
        });
      }
    });
  }, { root: null, rootMargin: '0px 0px -50% 0px', threshold: 0 });

  document.querySelectorAll('.card').forEach(card => observer.observe(card));

</script>
</body>
</html>
